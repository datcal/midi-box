# =============================================================================
# MIDI Box - Device Configuration
# =============================================================================
# Maps USB vendor:product IDs to friendly names and default settings.
# Maps hardware serial ports to connected devices.
#
# To find your device's USB ID, run: lsusb
# To find ALSA MIDI port names, run: aconnect -l
# =============================================================================

usb_devices:
  # Arturia KeyLab mkII 88  (lsusb: 1c75:02cb)
  "1c75:02cb":
    name: "KeyLab mkII 88"
    type: controller
    ports: 2  # MIDI port + DAW port; MIDI port is registered (DAW port skipped)
    default_channel: 0  # 0 = all channels

  # Arturia KeyStep 32  (lsusb: 1c75:0288)
  "1c75:0288":
    name: "KeyStep"
    type: controller_sequencer
    ports: 1
    default_channel: 0

  # Behringer MODEL D  (lsusb: 1397:1214)
  "1397:1214":
    name: "MODEL D"
    type: synth
    ports: 1
    default_channel: 2

  # Roland Boutique JP-08  (lsusb: 0582:01b5, ALSA name: "Boutiq")
  "0582:01b5":
    name: "Boutiq"
    type: synth
    ports: 1
    default_channel: 3

  # Arturia MicroBrute  (lsusb: 1c75:0207)
  "1c75:0207":
    name: "MicroBrute"
    type: synth
    ports: 1
    default_channel: 7

  # Roland SP-404 MK2  (lsusb: 0582:01e5)
  "0582:01e5":
    name: "SP-404 MK2"
    type: sampler
    ports: 1
    default_channel: 10

  # Roland TR-8S  (lsusb: 0582:020a)
  "0582:020a":
    name: "TR-8S"
    type: drum_machine
    ports: 2
    default_channel: 10


# Hardware ports (Pi native UARTs via device tree overlays)
# Keys are the serial device basename (e.g., ttyAMA0)
#
# GPIO → UART → Device mapping:
#   GPIO 14 → UART0 → /dev/ttyAMA0  (dtoverlay=disable-bt)
#   GPIO 4  → UART3 → /dev/ttyAMA5  (dtoverlay=uart3)
#   GPIO 8  → UART4 → /dev/ttyAMA3  (dtoverlay=uart4)
#   GPIO 12 → UART5 → /dev/ttyAMA4  (dtoverlay=uart5)
hardware_ports:
  ttyAMA0:
    name: "MIDI OUT 1"
    gpio: 14
    direction: out
    type: synth
    default_channel: 1

  ttyAMA5:
    name: "MIDI OUT 2"
    gpio: 4
    direction: out
    type: synth
    default_channel: 2

  ttyAMA3:
    name: "MIDI OUT 3"
    gpio: 8
    direction: out
    type: synth
    default_channel: 3

  ttyAMA4:
    name: "MIDI OUT 4"
    gpio: 12
    direction: out
    type: synth
    default_channel: 4
