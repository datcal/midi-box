# =============================================================================
# MIDI Box - Device Configuration
# =============================================================================
# Maps USB vendor:product IDs to friendly names and default settings.
# Maps hardware serial ports to connected devices.
#
# To find your device's USB ID, run: lsusb
# To find ALSA MIDI port names, run: aconnect -l
# =============================================================================

usb_devices:
  # Arturia KeyLab mkII 88  (lsusb: 1c75:02cb)
  "1c75:02cb":
    name: "KeyLab mkII 88"
    type: controller
    ports: 2  # MIDI port + DAW port; MIDI port is registered (DAW port skipped)
    default_channel: 0  # 0 = all channels

  # Arturia KeyStep 32  (lsusb: 1c75:0288)
  "1c75:0288":
    name: "KeyStep"
    type: controller_sequencer
    ports: 1
    default_channel: 0

  # Behringer MODEL D  (lsusb: 1397:1214)
  "1397:1214":
    name: "MODEL D"
    type: synth
    ports: 1
    default_channel: 2

  # Roland Boutique JP-08  (lsusb: 0582:01b5, ALSA name: "Boutiq")
  "0582:01b5":
    name: "Boutiq"
    type: synth
    ports: 1
    default_channel: 3

  # Arturia MicroBrute  (lsusb: 1c75:0207)
  "1c75:0207":
    name: "MicroBrute"
    type: synth
    ports: 1
    default_channel: 7

  # Roland SP-404 MK2  (lsusb: 0582:01e5)
  "0582:01e5":
    name: "SP-404 MK2"
    type: sampler
    ports: 1
    default_channel: 10

  # Roland TR-8S  (lsusb: 0582:020a)
  "0582:020a":
    name: "TR-8S"
    type: drum_machine
    ports: 2
    default_channel: 10


# Hardware ports (SC16IS752 UARTs + Pi native UART)
# Keys are the serial device basename (e.g., ttySC0)
hardware_ports:
  ttySC0:
    name: "MS-20 Mini"
    direction: out
    type: synth
    default_channel: 1

  ttySC1:
    name: "Volca 1"
    direction: out
    type: synth
    default_channel: 4

  ttySC2:
    name: "Volca 2"
    direction: out
    type: synth
    default_channel: 5

  ttySC3:
    name: "Volca 3"
    direction: out
    type: synth
    default_channel: 6

  ttyAMA0:
    name: "Spare DIN 1"
    direction: both
    type: unknown
    default_channel: 0
